<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiocoGeometry</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede8; --panel: #e8e4de; --border: #ccc8c0;
    --text: #1a1a1a; --muted: #888;
    --font: 'Share Tech Mono', 'Courier New', monospace;
    --sidebar-w: 200px;
  }
  html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 12px; }

  /* ── APP SHELL ── */
  #app { display: flex; height: 100vh; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  #logo {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  #logo .name { font-size: 13px; letter-spacing: 0.04em; }
  #logo .sub  { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; }

  .sb-section {
    padding: 10px 14px 4px;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  #effect-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
  #effect-list::-webkit-scrollbar { display: none; }

  .ef-item {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    user-select: none;
    transition: background 0.1s;
  }
  .ef-item:hover { background: rgba(0,0,0,0.04); }
  .ef-item.active { background: var(--text); color: var(--bg); border-left-color: var(--bg); }
  .ef-item.soon   { opacity: 0.38; cursor: default; }
  .ef-item.soon:hover { background: transparent; }

  .ef-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .ef-item.live .ef-dot   { background: #3a9a5c; }
  .ef-item.active .ef-dot { background: #7effa8; }
  .ef-name { font-size: 10px; flex: 1; letter-spacing: 0.03em; }
  .ef-tag  { font-size: 8px; color: var(--muted); }
  .ef-item.active .ef-tag { color: rgba(255,255,255,0.5); }

  #sb-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 9px; color: var(--muted); line-height: 1.7;
  }
  #sb-footer a { color: var(--muted); text-decoration: none; }
  #sb-footer a:hover { color: var(--text); }

  /* ── MAIN ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── TOPBAR ── */
  #topbar {
    height: 34px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px; gap: 8px;
    background: var(--bg);
  }
  .bc { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .bc .cur { color: var(--text); }
  .bc-sep { color: var(--border); }
  #topbar-right { margin-left: auto; }
  .tb-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 9px;
    padding: 3px 9px; cursor: pointer; transition: all 0.1s;
    letter-spacing: 0.04em;
  }
  .tb-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── CONTENT AREA ── */
  #content { flex: 1; overflow: hidden; position: relative; }

  /* HOME */
  #home-view { height: 100%; overflow-y: auto; padding: 36px 40px; }
  .home-title { font-size: 26px; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 6px; }
  .home-sub   { font-size: 10px; color: var(--muted); max-width: 360px; line-height: 1.7; margin-bottom: 36px; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px; border: 1px solid var(--border); background: var(--border);
  }
  .card {
    background: var(--bg); padding: 0; cursor: pointer;
    transition: background 0.1s; position: relative;
    display: flex; flex-direction: column;
  }
  .card:hover { background: #e8e4de; }
  .card.soon   { opacity: 0.45; cursor: default; }
  .card.soon:hover { background: var(--bg); }

  .card-preview {
    width: 100%; height: 80px;
    background: var(--panel); overflow: hidden; flex-shrink: 0;
  }
  .card-preview canvas { width: 100%; height: 100%; display: block; }

  .card-body { padding: 12px 14px 14px; flex: 1; }
  .card-name { font-size: 11px; letter-spacing: 0.04em; margin-bottom: 4px; }
  .card-desc { font-size: 9px; color: var(--muted); line-height: 1.5; }
  .card-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 8px; padding: 2px 5px;
    background: var(--text); color: var(--bg);
    letter-spacing: 0.06em;
  }
  .card-badge.live { background: #3a9a5c; }

  /* EFFECT VIEW */
  #effect-view { display: none; height: 100%; }
  #effect-view.on { display: block; }

  /* The dots tool is embedded as srcdoc iframe */
  #tool-iframe { width: 100%; height: 100%; border: none; display: block; }

  /* COMING SOON */
  #coming-view {
    display: none; height: 100%;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    color: var(--muted);
  }
  #coming-view.on { display: flex; }
  .coming-name { font-size: 20px; color: var(--text); }
  .coming-sub  { font-size: 10px; line-height: 1.8; text-align: center; max-width: 280px; }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="logo">
      <div class="name">GiocoGeometry</div>
      <div class="sub">image effects lab</div>
    </div>
    <div class="sb-section">/effects</div>
    <div id="effect-list"></div>
    <div id="sb-footer">
      <div><a href="https://github.com/Mattityah/geo" target="_blank">github ↗</a></div>
      <div>mattityah.github.io/geo</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="bc">
        <span style="cursor:pointer" onclick="showHome()">GiocoGeometry</span>
        <span class="bc-sep" id="bc-sep" style="display:none">/</span>
        <span class="cur" id="bc-cur"></span>
      </div>
      <div id="topbar-right">
        <button class="tb-btn" onclick="showHome()">home</button>
      </div>
    </div>

    <div id="content">
      <!-- HOME -->
      <div id="home-view">
        <div class="home-title">image<br>effects</div>
        <div class="home-sub">upload any image — apply generative effects drawn from print, computation and graphic design.</div>
        <div class="cards-grid" id="cards-grid"></div>
      </div>

      <!-- EFFECT: embedded tool -->
      <div id="effect-view">
        <iframe id="tool-iframe" src="about:blank"></iframe>
      </div>

      <!-- COMING SOON -->
      <div id="coming-view">
        <div class="coming-name" id="coming-name"></div>
        <div class="coming-sub" id="coming-desc"></div>
        <div style="font-size:9px;color:var(--muted);margin-top:4px">coming soon</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── EFFECT REGISTRY ──────────────────────────────────────────────────────────
const EFFECTS = [
  { id:'dots',      name:'DOTS',             desc:'halftone grid · floyd-steinberg dithering · shapes · multi-color palette · SVG export', live:true  },

const DOTS_HTML = `<!DOCTYPE html>

<script>
const S = {
  canvasW:800, canvasH:800, blur:0, contrast:1, brightness:1, gamma:1,

[['blur','blur'],['contrast','contrast'],['brightness','brightness'],['gamma','gamma'],

function scheduleRender(){clearTimeout(renderJob);renderJob=setTimeout(isDragging?doPreview:doRender,isDragging?200:60);}

function doPreview(){
  if(!sourceImg)return;
  const origW=S.canvasW,origH=S.canvasH,origStep=S.stepSize;
  const ps=Math.min(1,400/Math.max(origW,origH));
  S.canvasW=Math.round(origW*ps); S.canvasH=Math.round(origH*ps); S.stepSize=Math.max(2,Math.round(origStep*ps));
  doRender(); S.canvasW=origW; S.canvasH=origH; S.stepSize=origStep;
}

function getSafeStep(cw,ch,step){
  const size=Math.max(cw,ch);
  const diag=Math.ceil(Math.sqrt(2)*size)+step*4;
  const MAX_CELLS=60000;
  let s=step;
  while(true){const gw=Math.ceil(diag/s)+2;const gh=Math.ceil(diag/s)+2;if(gw*gh<=MAX_CELLS)break;s++;}
  if(s!==step){S.stepSize=s;const sl=document.getElementById('step-size');const ni=document.getElementById('num-step-size');if(sl)sl.value=s;if(ni)ni.value=s;}
  const diag2=Math.ceil(Math.sqrt(2)*size)+s*4;
  return{gw:Math.ceil(diag2/s)+2,gh:Math.ceil(diag2/s)+2,step:s};
}

let currentRenderID=0;
function yieldFrame(){return new Promise(r=>setTimeout(r,0));}

async function doRender(){
  if(!sourceImg)return;
  const myID=++currentRenderID;
  spinner.classList.add('visible');
  await yieldFrame(); if(myID!==currentRenderID)return;
  const{gw,gh}=getSafeStep(S.canvasW,S.canvasH,S.stepSize);
  canvas.width=S.canvasW; canvas.height=S.canvasH;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,S.canvasW,S.canvasH);
  if(!S.showEffect){
    off.width=S.canvasW;off.height=S.canvasH;offCtx.fillStyle='#fff';offCtx.fillRect(0,0,S.canvasW,S.canvasH);
    const sc=Math.min(S.canvasW/sourceImg.width,S.canvasH/sourceImg.height);
    const sw=sourceImg.width*sc,sh=sourceImg.height*sc;
    offCtx.drawImage(sourceImg,(S.canvasW-sw)/2,(S.canvasH-sh)/2,sw,sh);
    ctx.drawImage(off,0,0); spinner.classList.remove('visible'); return;
  }
  const gray=prepareGray(gw,gh);
  await yieldFrame(); if(myID!==currentRenderID)return;
  const mask=dither(gray,gw,gh);
  await yieldFrame(); if(myID!==currentRenderID)return;
  const cells=collectCells(mask,gw,gh,S.canvasW,S.canvasH);
  await yieldFrame(); if(myID!==currentRenderID)return;
  const r=S.shapeSize,cr=S.cornerRadius,CHUNK=1500;
  if(S.color==='mono'){
    for(let i=0;i<cells.length;i+=CHUNK){
      if(myID!==currentRenderID)return;
      ctx.fillStyle='#1a1a1a'; ctx.beginPath();
      const end=Math.min(i+CHUNK,cells.length);
      for(let j=i;j<end;j++){const c=cells[j];drawShape(ctx,c.shape,c.x,c.y,r,cr);}
      ctx.fill(); await yieldFrame();
    }
  } else {
    const byColor={};
    cells.forEach(c=>{(byColor[c.color]=byColor[c.color]||[]).push(c);});
    for(const[col,group]of Object.entries(byColor)){
      if(myID!==currentRenderID)return;
      ctx.fillStyle=col; ctx.beginPath();
      group.forEach(c=>drawShape(ctx,c.shape,c.x,c.y,r,cr));
      ctx.fill(); await yieldFrame();
    }
  }
  if(myID===currentRenderID)spinner.classList.remove('visible');
}

function prepareGray(gw,gh){
  off.width=gw; off.height=gh;
  offCtx.fillStyle='#fff'; offCtx.fillRect(0,0,gw,gh);
  offCtx.filter=\`blur(\${S.blur}px) contrast(\${S.contrast}) brightness(\${S.brightness})\`;
  const scX=gw/sourceImg.width,scY=gh/sourceImg.height,sc=Math.min(scX,scY);
  const sw=sourceImg.width*sc,sh=sourceImg.height*sc;
  offCtx.drawImage(sourceImg,(gw-sw)/2,(gh-sh)/2,sw,sh);
  offCtx.filter='none';
  const d=offCtx.getImageData(0,0,gw,gh).data;
  const gray=new Float32Array(gw*gh);
  for(let i=0;i<gray.length;i++){
    const p=i*4; let l=d[p]*.299+d[p+1]*.587+d[p+2]*.114;
    if(S.gamma!==1)l=255*Math.pow(l/255,S.gamma);
    gray[i]=S.invert?255-l:l;
  }
  return gray;
}

function dither(gray,gw,gh){
  const out=new Uint8Array(gw*gh),buf=new Float32Array(gray),t=S.threshold;
  if(S.dither==='none'){for(let i=0;i<buf.length;i++)out[i]=buf[i]<t?1:0;return out;}
  if(S.dither==='ordered'){
    const bayer=[0,128,32,160,192,64,224,96,48,176,16,144,240,112,208,80];
    for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){const i=y*gw+x;out[i]=(buf[i]+bayer[(y%4)*4+(x%4)]*.5-64)<t?1:0;}
    return out;
  }
  for(let y=0;y<gh;y++){
    for(let x=0;x<gw;x++){
      const i=y*gw+x,nw=buf[i]<t?0:255;
      out[i]=nw===0?1:0;const err=buf[i]-nw;
      if(x+1<gw)buf[i+1]+=err*7/16;
      if(y+1<gh){if(x>0)buf[i+gw-1]+=err*3/16;buf[i+gw]+=err*5/16;if(x+1<gw)buf[i+gw+1]+=err/16;}
    }
  }
  return out;
}

const MIX=['square','circle','arrow'];
function shapeFor(col,row){
  if(S.shape!=='mix')return S.shape;
  if(S.mix==='random'){const s=((col*2654435761)^(row*2246822519))>>>0;return MIX[s%3];}
  return MIX[(col+row)%3];
}
function colorFor(col){if(S.color==='mono'||!activeColors.length)return'#1a1a1a';return activeColors[col%activeColors.length];}

function drawShape(ctx,shape,cx,cy,r,cr){
  switch(shape){
    case'circle':ctx.moveTo(cx+r,cy);ctx.arc(cx,cy,r,0,Math.PI*2);break;
    case'square':{const rx=Math.min(cr,r),x=cx-r,y=cy-r,w=r*2;
      if(!rx){ctx.rect(x,y,w,w);break;}
      ctx.moveTo(x+rx,y);ctx.lineTo(x+w-rx,y);ctx.arcTo(x+w,y,x+w,y+rx,rx);
      ctx.lineTo(x+w,y+w-rx);ctx.arcTo(x+w,y+w,x+w-rx,y+w,rx);
      ctx.lineTo(x+rx,y+w);ctx.arcTo(x,y+w,x,y+w-rx,rx);
      ctx.lineTo(x,y+rx);ctx.arcTo(x,y,x+rx,y,rx);ctx.closePath();break;}
    case'arrow':ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r*.6,cy-r*.9);ctx.lineTo(cx+r*.6,cy+r*.9);ctx.closePath();break;
  }
}

function collectCells(mask,gw,gh,cw,ch){
  const size=Math.max(cw,ch),step=S.stepSize,angleRad=S.gridAngle*Math.PI/180;
  const cx=cw/2,cy=ch/2;
  const diag=Math.ceil(Math.sqrt(2)*size)+step*4;
  const startX=cx-diag/2,startY=cy-diag/2;
  const cols=Math.ceil(diag/step)+1,rows=Math.ceil(diag/step)+1;
  const cells=[];
  for(let row=0;row<=rows;row++){
    for(let col=0;col<=cols;col++){
      const gc=Math.round((col/cols)*(gw-1)),gr=Math.round((row/rows)*(gh-1));
      if(!mask[gr*gw+gc])continue;
      let lx=startX+col*step,ly=startY+row*step;
      if(S.grid==='benday'&&row%2===1)lx+=step/2;
      const dx=lx-cx,dy=ly-cy,a=angleRad;
      const drawX=cx+dx*Math.cos(a)-dy*Math.sin(a);
      const drawY=cy+dx*Math.sin(a)+dy*Math.cos(a);
      const n=S.noise;
      cells.push({col,row,x:n?drawX+(Math.random()-.5)*n:drawX,y:n?drawY+(Math.random()-.5)*n:drawY,shape:shapeFor(col,row),color:colorFor(col)});
    }
  }
  return cells;
}

function doExport(){
  if(!sourceImg)return;
  if(S.format==='png'){const a=document.createElement('a');a.download='halftone.png';a.href=canvas.toDataURL('image/png');a.click();}
  else{
    const size=Math.max(S.canvasW,S.canvasH),step=S.stepSize;
    const diag=Math.ceil(Math.sqrt(2)*size)+step*4;
    const gw=Math.ceil(diag/step)+2,gh=Math.ceil(diag/step)+2;
    const gray=prepareGray(gw,gh),mask=dither(gray,gw,gh),cells=collectCells(mask,gw,gh,S.canvasW,S.canvasH);
    const r=S.shapeSize,cr=S.cornerRadius;
    let s='';
    cells.forEach(({shape,x,y,color})=>{
      const fill=S.color==='mono'?'#1a1a1a':color,rx=Math.min(cr,r);
      if(shape==='circle')s+=\`<circle cx="\${x.toFixed(1)}" cy="\${y.toFixed(1)}" r="\${r}" fill="\${fill}"/>\`;
      else if(shape==='square')s+=\`<rect x="\${(x-r).toFixed(1)}" y="\${(y-r).toFixed(1)}" width="\${r*2}" height="\${r*2}" rx="\${rx}" fill="\${fill}"/>\`;
      else s+=\`<polygon points="\${(x-r).toFixed(1)},\${y.toFixed(1)} \${(x+r*.6).toFixed(1)},\${(y-r*.9).toFixed(1)} \${(x+r*.6).toFixed(1)},\${(y+r*.9).toFixed(1)}" fill="\${fill}"/>\`;
    });
    const svg=\`<svg xmlns="http://www.w3.org/2000/svg" width="\${S.canvasW}" height="\${S.canvasH}"><rect width="\${S.canvasW}" height="\${S.canvasH}" fill="white"/><g>\${s}</g></svg>\`;
    const a=document.createElement('a');a.download='halftone.svg';a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));a.click();
  }
}

const ditherCanvas=document.getElementById('dither-preview');
const ditherCtx=ditherCanvas.getContext('2d');
function updateDitherPreview(){
  if(!sourceImg||!ditherCanvas)return;
  const size=200;ditherCanvas.width=size;ditherCanvas.height=size;
  const tempOff=document.createElement('canvas');tempOff.width=size;tempOff.height=size;
  const tempCtx=tempOff.getContext('2d',{willReadFrequently:true});
  tempCtx.fillStyle='#fff';tempCtx.fillRect(0,0,size,size);
  tempCtx.filter=\`contrast(\${S.contrast}) brightness(\${S.brightness})\`;
  const sc=Math.min(size/sourceImg.width,size/sourceImg.height);
  const sw=sourceImg.width*sc,sh=sourceImg.height*sc;
  tempCtx.drawImage(sourceImg,(size-sw)/2,(size-sh)/2,sw,sh);
  tempCtx.filter='none';
  const d=tempCtx.getImageData(0,0,size,size);
  const gray=new Float32Array(size*size);
  for(let i=0;i<gray.length;i++){const p=i*4;let l=d.data[p]*.299+d.data[p+1]*.587+d.data[p+2]*.114;if(S.gamma!==1)l=255*Math.pow(l/255,S.gamma);gray[i]=S.invert?255-l:l;}
  const mask=dither(gray,size,size);
  const out=ditherCtx.createImageData(size,size);
  for(let i=0;i<mask.length;i++){const v=mask[i]?255:0;out.data[i*4]=out.data[i*4+1]=out.data[i*4+2]=v;out.data[i*4+3]=255;}
  ditherCtx.putImageData(out,0,0);
}

function showHome() {

function openEffect(id) {
  const ef = EFFECTS.find(e => e.id === id);
  if (!ef) return;

  document.querySelectorAll('.ef-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.getElementById('bc-sep').style.display = '';
  document.getElementById('bc-cur').textContent = ef.name;
  document.getElementById('home-view').style.display = 'none';

  if (ef.live) {
    document.getElementById('effect-view').classList.add('on');
    document.getElementById('coming-view').classList.remove('on');
    // Load the tool into the iframe
    if (id === 'dots') {
      const iframe = document.getElementById('tool-iframe');
      // Only reload if needed
      if (!iframe.dataset.loaded) {
        const blob = new Blob([DOTS_HTML], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);
        iframe.dataset.loaded = '1';
      }
    }
  } else {
    document.getElementById('effect-view').classList.remove('on');
    document.getElementById('coming-view').classList.add('on');
    document.getElementById('coming-name').textContent = ef.name;
    document.getElementById('coming-desc').textContent = ef.desc;
  }
}

// ── CARD PREVIEWS ────────────────────────────────────────────────────────────
function drawPreview(id) {
  const c = document.getElementById('prev-' + id);
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#e8e4de';
  ctx.fillRect(0, 0, W, H);

  switch(id) {
    case 'dots': {
      ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1a1a1a';
      const step = 12;
      for (let y = step/2; y < H; y += step) {
        for (let x = step/2; x < W; x += step) {
          const t = x / W;
          const r = 1 + t * 4;
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
        }
      }
      break;
    }
    case 'dithering': {
      ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,W,H);
      const bayer = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
      const ps = 4;
      for (let y = 0; y < H; y += ps) for (let x = 0; x < W; x += ps) {
        const t = x / W;
        const thresh = bayer[Math.floor(y/ps)%4][Math.floor(x/ps)%4] / 16;
        ctx.fillStyle = t > thresh ? '#1a1a1a' : '#f0ede8';
        ctx.fillRect(x, y, ps, ps);
      }
      break;
    }
    case 'stippling': {
      ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1a1a1a';
      const cx = W/2, cy = H/2, R = Math.min(W,H)*0.33;
      for (let a = 0; a < Math.PI*2; a += 0.12) {
        const x = cx + Math.cos(a)*R, y = cy + Math.sin(a)*R;
        const s = 1.5 + Math.random() * 2.5;
        ctx.fillRect(x, y, s, s);
      }
      for (let a = 0; a < Math.PI*2; a += 0.22) {
        const x = cx + Math.cos(a)*R*0.55, y = cy + Math.sin(a)*R*0.55;
        ctx.fillRect(x, y, 1.5, 1.5);
      }
      break;
    }
    case 'bevel': {
      const g = ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,'#fff'); g.addColorStop(0.5,'#aaa'); g.addColorStop(1,'#111');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      break;
    }
    case 'edge': {
      ctx.fillStyle = '#888'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let x = 0; x <= W; x++) { const y = H/2 + Math.sin(x/12)*H*0.3; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
      ctx.stroke();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x <= W; x++) { const y = H/2 + 2 + Math.sin(x/12)*H*0.3; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
      ctx.stroke();
      break;
    }
    case 'recolor': {
      const g = ctx.createLinearGradient(0,0,W,0);
      g.addColorStop(0,'#1a1a1a'); g.addColorStop(0.25,'#2e5fa3'); g.addColorStop(0.5,'#c95f2a'); g.addColorStop(0.75,'#c8b040'); g.addColorStop(1,'#f0ede8');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha = 0.25;
      for (let i = 0; i < 6; i++) { ctx.fillStyle = i%2?'#000':'#fff'; ctx.fillRect(i*W/6,0,W/6,H); }
      ctx.globalAlpha = 1;
      break;
    }
    case 'patterns': {
      ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1a1a1a';
      const cell = 10;
      for (let y = 0; y < H; y += cell) for (let x = 0; x < W; x += cell) {
        const t = (x/W + y/H) / 2;
        if (t < 0.55) { ctx.globalAlpha = 1 - t; ctx.fillRect(x+1,y+1,cell-2,cell-2); }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'distort': {
      for (let y = 0; y < H; y++) {
        const shift = Math.sin(y / 7) * 20 * (y/H);
        ctx.fillStyle = `hsl(${200 + y/H*40},20%,${45+shift}%)`;
        ctx.fillRect(0, y, W, 1);
      }
      break;
    }
    case 'ascii': {
      ctx.fillStyle = '#f0ede8'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '6px monospace'; ctx.textBaseline = 'top';
      const chars = ' .:-=+*#%@';
      for (let y = 0; y < H; y += 8) for (let x = 0; x < W; x += 5) {
        const t = (x/W + y/H) / 2;
        ctx.fillText(chars[Math.floor(t*(chars.length-1))], x, y);
      }
      break;
    }
    default: {
      const hues = { scatter:140, displace:270, cellular:0, gradients:40, crt:200, slide:290 };
      const h = hues[id] || 200;
      ctx.fillStyle = `hsl(${h},15%,88%)`; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = `hsl(${h},30%,40%)`;
      ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('coming soon', W/2, H/2);
      ctx.textAlign = 'left';
      break;
    }
  }
}

  buildSidebar();
  buildCards();
  showHome();
});
</script>
