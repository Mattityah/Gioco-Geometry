<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halftone Dots</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede8; --panel: #e8e4de; --border: #ccc8c0;
    --text: #1a1a1a; --text-muted: #666;
    --font: 'Courier New', Courier, monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 280px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header a { font-size: 11px; text-decoration: none; color: var(--text-muted); }
  .sidebar-header h1 { font-size: 13px; font-weight: normal; margin-top: 4px; }
  .upload-area { margin: 12px; border: 1px dashed var(--border); padding: 12px; text-align: center; cursor: pointer; position: relative; }
  .upload-area:hover { background: rgba(0,0,0,0.04); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-label { font-size: 12px; font-weight: bold; letter-spacing: 0.05em; }
  .upload-hint { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .shortcut { font-size: 10px; color: var(--text-muted); background: rgba(0,0,0,0.08); padding: 2px 5px; border-radius: 2px; }
  .controls { padding: 0 12px 12px; flex: 1; }
  .control-row { margin-top: 10px; }
  .control-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .control-label span { color: var(--text-muted); }
  input[type="range"] { width: 100%; height: 2px; -webkit-appearance: none; background: var(--border); outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--text); border-radius: 50%; cursor: pointer; }
  .section-title { font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin: 16px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: pointer; user-select: none; }
  .collapsible { overflow: hidden; transition: max-height 0.2s ease; }
  .collapsible.collapsed { max-height: 0 !important; }
  .switcher { display: flex; gap: 4px; margin-top: 10px; align-items: center; }
  .switcher label { font-size: 11px; min-width: 70px; flex-shrink: 0; }
  .switcher-btns { display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .switcher-btns button { font-family: var(--font); font-size: 13px; padding: 3px 10px; background: transparent; border: none; cursor: pointer; color: var(--text-muted); }
  .switcher-btns button.active { background: var(--text); color: var(--bg); }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 11px; cursor: pointer; user-select: none; }
  .toggle-indicator { width: 10px; height: 10px; border: 1px solid var(--text); display: inline-flex; align-items: center; justify-content: center; font-size: 8px; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .format-switcher { display: flex; align-items: center; gap: 8px; }
  .format-switcher label { font-size: 11px; }
  .btn-export { font-family: var(--font); font-size: 12px; background: var(--text); color: var(--bg); border: none; padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 2px; width: 100%; }
  .btn-export:hover { opacity: 0.85; }
  .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  #canvas { display: block; }
  .drop-hint { position: absolute; text-align: center; pointer-events: none; }
  .drop-hint p { font-size: 13px; color: var(--text-muted); }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  /* Color palette */
  .color-palette { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .color-swatch { width: 20px; height: 20px; border-radius: 2px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
  .color-swatch.active { border-color: var(--text); }
  .color-row { margin-top: 10px; }
  .color-row label { font-size: 11px; display: block; margin-bottom: 6px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <a href="#">/effects</a>
    <h1>[ dots ]</h1>
  </div>

  <div class="upload-area">
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    <div class="upload-label">Upload media <span class="shortcut">cmd + O</span></div>
    <div class="upload-hint">[.jpg, .png, .webp]</div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div class="control-label">Canvas Size <span id="val-canvas-size">600</span></div>
      <input type="range" id="canvas-size" min="100" max="1000" step="10" value="600">
    </div>

    <div class="section-title" id="toggle-preprocess">Image Preprocessing <span class="toggle-icon">−</span></div>
    <div class="collapsible" id="section-preprocess" style="max-height:500px">
      <div class="control-row">
        <div class="control-label">Blur <span id="val-blur">0</span></div>
        <input type="range" id="blur" min="0" max="10" step="1" value="0">
      </div>
      <div class="control-row">
        <div class="control-label">Grain <span id="val-grain">0</span></div>
        <input type="range" id="grain" min="0" max="1" step="0.01" value="0">
      </div>
      <div class="control-row">
        <div class="control-label">Gamma <span id="val-gamma">1</span></div>
        <input type="range" id="gamma" min="0.1" max="2" step="0.1" value="1">
      </div>
      <div class="control-row">
        <div class="control-label">Black Point <span id="val-black-point">0</span></div>
        <input type="range" id="black-point" min="0" max="255" step="1" value="0">
      </div>
      <div class="control-row">
        <div class="control-label">White Point <span id="val-white-point">255</span></div>
        <input type="range" id="white-point" min="0" max="255" step="1" value="255">
      </div>
    </div>

    <div class="toggle-row" id="toggle-effect">
      <div style="display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text-muted)">
        <span>[</span><span class="toggle-indicator" id="effect-indicator">✓</span><span>]</span>
      </div>
      <label>Show Effect</label>
    </div>

    <div class="toggle-row" id="toggle-invert">
      <div style="display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text-muted)">
        <span>[</span><span class="toggle-indicator" id="invert-indicator">&nbsp;</span><span>]</span>
      </div>
      <label>Invert</label>
    </div>

    <div class="control-row">
      <div class="control-label">Threshold <span id="val-threshold">128</span></div>
      <input type="range" id="threshold" min="0" max="255" step="1" value="128">
    </div>

    <!-- Shape -->
    <div class="switcher">
      <label>Shape</label>
      <div class="switcher-btns" id="shape-switcher">
        <button class="active" data-val="circle" title="Circle">●</button>
        <button data-val="square" title="Square">■</button>
        <button data-val="triangle" title="Triangle">▲</button>
        <button data-val="mix" title="Mix">✦</button>
      </div>
    </div>

    <!-- Mix pattern (visible only in mix mode) -->
    <div id="mix-pattern-row" class="switcher" style="display:none">
      <label>Pattern</label>
      <div class="switcher-btns" id="mix-pattern-switcher">
        <button class="active" data-val="ordered">Grid</button>
        <button data-val="random">Random</button>
      </div>
    </div>

    <!-- Color mode -->
    <div class="switcher">
      <label>Color</label>
      <div class="switcher-btns" id="color-mode-switcher">
        <button class="active" data-val="mono">Mono</button>
        <button data-val="multi">Multi</button>
      </div>
    </div>

    <!-- Multi-color palette (hidden in mono mode) -->
    <div id="palette-row" class="color-row" style="display:none">
      <label>Palette</label>
      <div class="color-palette" id="color-palette">
        <!-- swatches injected by JS -->
      </div>
    </div>

    <!-- Grid -->
    <div class="switcher">
      <label>Grid Type</label>
      <div class="switcher-btns" id="grid-type-switcher">
        <button class="active" data-val="regular">Regular</button>
        <button data-val="benday">Benday</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Grid Angle <span id="val-grid-angle">0</span></div>
      <input type="range" id="grid-angle" min="-45" max="45" step="1" value="0">
    </div>
    <div class="control-row">
      <div class="control-label">Min Dot Size <span id="val-min-dot-size">1</span></div>
      <input type="range" id="min-dot-size" min="0" max="50" step="1" value="1">
    </div>
    <div class="control-row">
      <div class="control-label">Max Dot Size <span id="val-max-dot-size">10</span></div>
      <input type="range" id="max-dot-size" min="0" max="50" step="1" value="10">
    </div>
    <div class="control-row">
      <div class="control-label">Corner Radius <span id="val-corner-radius">4</span></div>
      <input type="range" id="corner-radius" min="0" max="20" step="1" value="4">
    </div>
    <div class="control-row">
      <div class="control-label">Step Size <span id="val-step-size">14</span></div>
      <input type="range" id="step-size" min="3" max="40" step="1" value="14">
    </div>
    <div class="control-row">
      <div class="control-label">Noise <span id="val-noise">0</span></div>
      <input type="range" id="noise" min="0" max="20" step="1" value="0">
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="format-switcher">
      <label>Output format</label>
      <div class="switcher-btns" id="format-switcher">
        <button class="active" data-val="png">PNG</button>
        <button data-val="svg">SVG</button>
      </div>
    </div>
    <button class="btn-export" id="btn-export">Export canvas <span class="shortcut">cmd + S</span></button>
  </div>
</aside>

<main class="canvas-area" id="canvasArea">
  <div class="drop-hint" id="dropHint"><p>Upload an image to get started</p></div>
  <canvas id="canvas"></canvas>
</main>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

let sourceImg = null;
let showEffect = true;
let invertColors = false;
let gridType = 'regular';
let shapeType = 'circle';
let mixPattern = 'ordered';
let colorMode = 'mono';
let outputFormat = 'png';
let renderTimeout = null;

// Shape cycling for mix mode
const SHAPES = ['circle', 'square', 'triangle'];

// Color palettes
const PALETTES = {
  active: ['#1a1a1a', '#c0392b', '#2980b9', '#27ae60', '#e67e22', '#8e44ad'],
};

// Swatch selection (which colors are enabled)
let activeColors = [...PALETTES.active];

// Build palette UI
function buildPalette() {
  const container = document.getElementById('color-palette');
  container.innerHTML = '';
  PALETTES.active.forEach((color, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch active';
    sw.style.background = color;
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      sw.classList.toggle('active');
      activeColors = [...container.querySelectorAll('.color-swatch.active')].map(s => s.dataset.color);
      if (activeColors.length === 0) { sw.classList.add('active'); activeColors = [color]; }
      scheduleRender();
    });
    container.appendChild(sw);
  });
}
buildPalette();

function getShapeForCell(col, row) {
  if (shapeType !== 'mix') return shapeType;
  if (mixPattern === 'random') {
    // Deterministic random based on position
    const seed = (col * 2654435761 ^ row * 2246822519) >>> 0;
    return SHAPES[seed % SHAPES.length];
  }
  // Ordered: tile a 3x3 pattern
  const pattern = [
    ['circle',   'triangle', 'square'  ],
    ['square',   'circle',   'triangle'],
    ['triangle', 'square',   'circle'  ],
  ];
  return pattern[row % 3][col % 3];
}

function getColorForCell(col, row) {
  if (colorMode === 'mono') return '#000000';
  if (activeColors.length === 0) return '#000000';
  // Cycle colors by column in ordered, random-ish in random
  if (mixPattern === 'random' || shapeType !== 'mix') {
    const seed = (col * 1234567 ^ row * 7654321) >>> 0;
    return activeColors[seed % activeColors.length];
  }
  return activeColors[col % activeColors.length];
}

const state = {
  canvasSize: 600, blur: 0, grain: 0, gamma: 1,
  blackPoint: 0, whitePoint: 255, threshold: 128,
  gridAngle: 0, minDotSize: 1, maxDotSize: 10,
  cornerRadius: 4, stepSize: 14, noise: 0
};

// Sliders
[
  ['canvas-size','canvasSize'], ['blur','blur'], ['grain','grain'],
  ['gamma','gamma'], ['black-point','blackPoint'], ['white-point','whitePoint'],
  ['threshold','threshold'], ['grid-angle','gridAngle'],
  ['min-dot-size','minDotSize'], ['max-dot-size','maxDotSize'],
  ['corner-radius','cornerRadius'], ['step-size','stepSize'], ['noise','noise']
].forEach(([id, key]) => {
  const el = document.getElementById(id);
  const vl = document.getElementById('val-' + id);
  el.addEventListener('input', () => {
    state[key] = parseFloat(el.value);
    if (vl) vl.textContent = el.value;
    scheduleRender();
  });
});

// Collapsible
document.getElementById('toggle-preprocess').addEventListener('click', function() {
  const sec = document.getElementById('section-preprocess');
  const icon = this.querySelector('.toggle-icon');
  sec.classList.toggle('collapsed');
  icon.textContent = sec.classList.contains('collapsed') ? '+' : '−';
  if (!sec.classList.contains('collapsed')) sec.style.maxHeight = '500px';
});

// Toggles
document.getElementById('toggle-effect').addEventListener('click', () => {
  showEffect = !showEffect;
  document.getElementById('effect-indicator').textContent = showEffect ? '✓' : ' ';
  scheduleRender();
});

document.getElementById('toggle-invert').addEventListener('click', () => {
  invertColors = !invertColors;
  document.getElementById('invert-indicator').textContent = invertColors ? '✓' : ' ';
  scheduleRender();
});

// Switchers
document.querySelectorAll('.switcher-btns').forEach(group => {
  group.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.val;
      if (group.id === 'grid-type-switcher') gridType = val;
      if (group.id === 'format-switcher') outputFormat = val;
      if (group.id === 'shape-switcher') {
        shapeType = val;
        document.getElementById('mix-pattern-row').style.display = val === 'mix' ? 'flex' : 'none';
      }
      if (group.id === 'mix-pattern-switcher') mixPattern = val;
      if (group.id === 'color-mode-switcher') {
        colorMode = val;
        document.getElementById('palette-row').style.display = val === 'multi' ? 'block' : 'none';
      }
      scheduleRender();
    });
  });
});

// File input
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
['dragover','drop'].forEach(ev => {
  document.getElementById('canvasArea').addEventListener(ev, e => {
    e.preventDefault();
    if (ev === 'drop' && e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
});
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { sourceImg = img; document.getElementById('dropHint').style.display = 'none'; scheduleRender(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'o') { e.preventDefault(); document.getElementById('fileInput').click(); }
  if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); doExport(); }
});

function scheduleRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 40);
}

// ---- PREPARE IMAGE ----
function prepareImage(size) {
  offscreen.width = size;
  offscreen.height = size;
  offCtx.fillStyle = '#ffffff';
  offCtx.fillRect(0, 0, size, size);

  const scale = Math.max(size / sourceImg.width, size / sourceImg.height);
  const sw = sourceImg.width * scale, sh = sourceImg.height * scale;
  const sx = (size - sw) / 2, sy = (size - sh) / 2;

  if (state.blur > 0) offCtx.filter = `blur(${state.blur}px)`;
  offCtx.drawImage(sourceImg, sx, sy, sw, sh);
  offCtx.filter = 'none';

  const d = offCtx.getImageData(0, 0, size, size);

  for (let i = 0; i < d.data.length; i += 4) {
    if (state.grain > 0) {
      const n = (Math.random() - 0.5) * state.grain * 255;
      d.data[i]   = Math.min(255, Math.max(0, d.data[i]   + n));
      d.data[i+1] = Math.min(255, Math.max(0, d.data[i+1] + n));
      d.data[i+2] = Math.min(255, Math.max(0, d.data[i+2] + n));
    }
    if (invertColors) {
      d.data[i]   = 255 - d.data[i];
      d.data[i+1] = 255 - d.data[i+1];
      d.data[i+2] = 255 - d.data[i+2];
    }
  }
  return d;
}

function sampleLum(pixels, x, y, size) {
  const px = Math.round(x), py = Math.round(y);
  if (px < 0 || px >= size || py < 0 || py >= size) return 255;
  const i = (py * size + px) * 4;
  let lum = pixels[i] * 0.299 + pixels[i+1] * 0.587 + pixels[i+2] * 0.114;
  const { blackPoint: bp, whitePoint: wp, gamma } = state;
  lum = Math.min(255, Math.max(0, (lum - bp) / Math.max(1, wp - bp) * 255));
  if (gamma !== 1) lum = 255 * Math.pow(lum / 255, gamma);
  return lum;
}

// ---- DRAW ONE SHAPE ----
function drawShape(ctx, shape, cx, cy, r, cr) {
  switch(shape) {
    case 'circle':
      ctx.moveTo(cx + r, cy);
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      break;
    case 'square': {
      const rx = Math.min(cr, r);
      const x = cx - r, y = cy - r, w = r * 2;
      if (rx <= 0) { ctx.rect(x, y, w, w); break; }
      ctx.moveTo(x + rx, y);
      ctx.lineTo(x + w - rx, y); ctx.arcTo(x+w, y, x+w, y+rx, rx);
      ctx.lineTo(x + w, y + w - rx); ctx.arcTo(x+w, y+w, x+w-rx, y+w, rx);
      ctx.lineTo(x + rx, y + w); ctx.arcTo(x, y+w, x, y+w-rx, rx);
      ctx.lineTo(x, y + rx); ctx.arcTo(x, y, x+rx, y, rx);
      ctx.closePath();
      break;
    }
    case 'triangle': {
      const h = r * 1.8;
      ctx.moveTo(cx, cy - h * 0.65);
      ctx.lineTo(cx + r, cy + h * 0.35);
      ctx.lineTo(cx - r, cy + h * 0.35);
      ctx.closePath();
      break;
    }
  }
}

// ---- MAIN RENDER ----
function render() {
  if (!sourceImg) return;
  const size = state.canvasSize;
  canvas.width = size;
  canvas.height = size;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);

  const imageData = prepareImage(size);
  if (!showEffect) { ctx.putImageData(imageData, 0, 0); return; }

  const { stepSize: step, gridAngle, minDotSize, maxDotSize, cornerRadius, noise, threshold } = state;
  const angleRad = gridAngle * Math.PI / 180;
  const pixels = imageData.data;
  const cx = size / 2, cy = size / 2;
  const diag = Math.ceil(Math.sqrt(2) * size) + step * 4;
  const startX = cx - diag / 2, startY = cy - diag / 2;
  const cols = Math.ceil(diag / step) + 1;
  const rows = Math.ceil(diag / step) + 1;

  if (colorMode === 'mono') {
    // Single pass for mono
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    for (let row = 0; row <= rows; row++) {
      for (let col = 0; col <= cols; col++) {
        let lx = startX + col * step;
        let ly = startY + row * step;
        if (gridType === 'benday' && row % 2 === 1) lx += step / 2;
        const dx = lx - cx, dy = ly - cy;
        const drawX = cx + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const drawY = cy + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
        const lum = sampleLum(pixels, lx, ly, size);
        if (lum > threshold) continue;
        const t = lum / threshold;
        const r = maxDotSize * (1 - t) + minDotSize * t;
        if (r < 0.3) continue;
        const nx = noise > 0 ? drawX + (Math.random()-0.5)*noise : drawX;
        const ny = noise > 0 ? drawY + (Math.random()-0.5)*noise : drawY;
        drawShape(ctx, getShapeForCell(col, row), nx, ny, r, cornerRadius);
      }
    }
    ctx.fill();
  } else {
    // Multi-color: draw each color separately
    const colorBuckets = {};
    for (let row = 0; row <= rows; row++) {
      for (let col = 0; col <= cols; col++) {
        let lx = startX + col * step;
        let ly = startY + row * step;
        if (gridType === 'benday' && row % 2 === 1) lx += step / 2;
        const dx = lx - cx, dy = ly - cy;
        const drawX = cx + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const drawY = cy + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
        const lum = sampleLum(pixels, lx, ly, size);
        if (lum > threshold) continue;
        const t = lum / threshold;
        const r = maxDotSize * (1 - t) + minDotSize * t;
        if (r < 0.3) continue;
        const nx = noise > 0 ? drawX + (Math.random()-0.5)*noise : drawX;
        const ny = noise > 0 ? drawY + (Math.random()-0.5)*noise : drawY;
        const color = getColorForCell(col, row);
        if (!colorBuckets[color]) colorBuckets[color] = [];
        colorBuckets[color].push({ nx, ny, r, shape: getShapeForCell(col, row) });
      }
    }
    Object.entries(colorBuckets).forEach(([color, dots]) => {
      ctx.fillStyle = color;
      ctx.beginPath();
      dots.forEach(({ nx, ny, r, shape }) => drawShape(ctx, shape, nx, ny, r, cornerRadius));
      ctx.fill();
    });
  }
}

// ---- EXPORT ----
document.getElementById('btn-export').addEventListener('click', doExport);
function doExport() {
  if (!sourceImg) return;
  if (outputFormat === 'png') {
    const link = document.createElement('a');
    link.download = 'halftone.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } else exportSVG();
}

function exportSVG() {
  const size = state.canvasSize;
  const { stepSize: step, gridAngle, minDotSize, maxDotSize, cornerRadius, noise, threshold } = state;
  const angleRad = gridAngle * Math.PI / 180;
  const imageData = prepareImage(size);
  const pixels = imageData.data;
  const cx = size/2, cy = size/2;
  const diag = Math.ceil(Math.sqrt(2)*size) + step*4;
  const startX = cx - diag/2, startY = cy - diag/2;
  const cols = Math.ceil(diag/step)+1, rows = Math.ceil(diag/step)+1;
  let shapes = '';

  for (let row = 0; row <= rows; row++) {
    for (let col = 0; col <= cols; col++) {
      let lx = startX + col*step, ly = startY + row*step;
      if (gridType==='benday' && row%2===1) lx += step/2;
      const dx=lx-cx, dy=ly-cy;
      const drawX = cx + dx*Math.cos(angleRad) - dy*Math.sin(angleRad);
      const drawY = cy + dx*Math.sin(angleRad) + dy*Math.cos(angleRad);
      const lum = sampleLum(pixels, lx, ly, size);
      if (lum > threshold) continue;
      const t = lum/threshold;
      const r = maxDotSize*(1-t) + minDotSize*t;
      if (r < 0.3) continue;
      const nx = noise>0 ? drawX+(Math.random()-.5)*noise : drawX;
      const ny = noise>0 ? drawY+(Math.random()-.5)*noise : drawY;
      const shape = getShapeForCell(col, row);
      const color = getColorForCell(col, row);
      const fill = colorMode==='mono' ? 'black' : color;

      if (shape==='circle') {
        shapes += `<circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="${r.toFixed(1)}" fill="${fill}"/>`;
      } else if (shape==='square') {
        const rx = Math.min(cornerRadius, r);
        shapes += `<rect x="${(nx-r).toFixed(1)}" y="${(ny-r).toFixed(1)}" width="${(r*2).toFixed(1)}" height="${(r*2).toFixed(1)}" rx="${rx}" fill="${fill}"/>`;
      } else {
        const h = r*1.8;
        shapes += `<polygon points="${nx.toFixed(1)},${(ny-h*.65).toFixed(1)} ${(nx+r).toFixed(1)},${(ny+h*.35).toFixed(1)} ${(nx-r).toFixed(1)},${(ny+h*.35).toFixed(1)}" fill="${fill}"/>`;
      }
    }
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="white"/><g>${shapes}</g></svg>`;
  const blob = new Blob([svg],{type:'image/svg+xml'});
  const link = document.createElement('a');
  link.download='halftone.svg'; link.href=URL.createObjectURL(blob); link.click();
}
